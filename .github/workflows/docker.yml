# Build the Docker image and publish it to the GitHub Container Registry
# (ghcr.io/isomoes/iread) — but only after the npm publish has actually succeeded.
#
# Chained off publish.yml via `workflow_run` (NOT the tag) so a failed publish
# never leaves behind a container image for a version that isn't on npm — exactly
# like release.yml. The tag push triggers publish.yml; when that run completes
# successfully this fires (in parallel with release.yml). Images are multi-arch
# (amd64 + arm64) so they run on x86 servers as well as Apple Silicon / Raspberry Pi.
#
# `workflow_run` always uses the workflow definition from the default branch, so
# this file must be on the default branch to take effect (it is). The tag name and
# commit come from the upstream run via `github.event.workflow_run.*`.
#
# The package is created on the first successful push; make it public once under
# the repository's Packages settings if you want anonymous `docker pull`.
name: Docker

on:
  workflow_run:
    workflows: ["Publish"]
    types:
      - completed

permissions:
  contents: read
  packages: write # push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    # Only when the publish succeeded, and only for tag pushes (head_branch is
    # the tag name, e.g. v0.2.3, for a tag-triggered upstream run). Typecheck is
    # already enforced by Publish, so it is not repeated here.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Stamp the package version from the upstream tag so the build-time
      # __APP_VERSION__ baked into the web bundle matches the image tag (Publish
      # stamps it the same way; the bump is never committed back).
      - name: Set version from tag
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: npm pkg set version="${TAG#v}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # vX.Y.Z -> tags: X.Y.Z, X.Y, latest (prereleases skip `latest`). The tag
      # comes from the upstream run, so semver is read from `value=` — under
      # workflow_run github.ref is the default branch, not the pushed tag.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.workflow_run.head_branch }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.workflow_run.head_branch }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip the provenance/SBOM attestation manifests so the package's
          # architecture list stays clean (amd64 + arm64, no "unknown/unknown").
          provenance: false
          sbom: false
