# Publish iread to npm when a vX.Y.Z tag is pushed.
#
# This is the entry point of the release pipeline: the tag triggers this, and
# release.yml chains off it via `workflow_run` to cut the GitHub Release only
# after this publish succeeds. So a failed publish never produces a Release for
# a version that isn't on npm.
#
# Auth is npm "trusted publishing" via OIDC — no NPM_TOKEN secret. One-time setup
# on npmjs.com (Package settings → Trusted publishing) must register:
#   Package    : @isomoes/iread
#   Repository : isomoes/iread
#   Workflow   : .github/workflows/publish.yml
#   Environment: (leave blank — none is used below)
# Do this after the package's first manual `npm publish` so it exists to configure.
name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm: package manager + the build (tsc server build + vite client build).
      # No `packageManager` field in package.json, so the version is pinned here.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # Node 24 is required — the server uses the built-in `node:sqlite` module
      # (no third-party driver). registry-url writes the npmjs .npmrc; the cache
      # keys off the pnpm store, so pnpm must be set up first (above).
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # Trusted publishing requires npm >= 11.5.1; pin to latest to be safe.
      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Gate: never publish a tree that doesn't typecheck (the only correctness
      # gate — there is no test suite or linter).
      - name: Typecheck
        run: pnpm typecheck

      # Stamp the package version from the pushed tag (vX.Y.Z -> X.Y.Z).
      # `npm pkg set` is a pure package.json edit — no dependency-tree reconcile.
      - name: Set version from tag
        env:
          TAG: ${{ github.ref_name }}
        run: npm pkg set version="${TAG#v}"

      # `npm publish` runs the package's prepack (`pnpm build`) to produce dist/,
      # then publishes. npm — not pnpm — is the reference impl for OIDC trusted
      # publishing. No token: OIDC supplies short-lived credentials and provenance
      # is attached automatically. `@isomoes/iread` is scoped, so --access public
      # is required — scoped packages default to restricted (package.json's
      # publishConfig.access also pins this).
      - name: Publish
        run: npm publish --provenance --access public
